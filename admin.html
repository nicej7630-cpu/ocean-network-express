<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean Network Express - Admin Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
display:flex;
background:#f4f8fb;
}

.sidebar{
width:250px;
height:100vh;
background:#003b73;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px 0;
}

.sidebar a:hover{
color:#4fc3f7;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;
}

table th,
table td{
padding:15px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#003b73;
color:white;
}

.logout{
display:inline-block;
margin-top:30px;
padding:12px 25px;
background:#e53935;
color:white;
text-decoration:none;
border-radius:8px;
}
</style>

</head>

<body>
