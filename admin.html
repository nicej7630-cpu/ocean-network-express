<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Ocean Network Express</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#003b73;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:1200px;
margin:30px auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
color:#003b73;
margin-bottom:10px;
}

.form-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#003b73;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:30px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00539f;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;
}

table th,table td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

table th{
background:#003b73;
color:white;
}
</style>

</head>

<body>

<header>

<h1>🚢 Ocean Network Express Admin Dashboard</h1>

</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>128</h2>
<p>Total Shipments</p>
</div>

<div class="card">
<h2>84</h2>
<p>In Transit</p>
</div>

<div class="card">
<h2>36</h2>
<p>Delivered</p>
</div>

<div class="card">
<h2>8</h2>
<p>Pending</p>
</div>

</div>

<div class="form-box">

<h2>Create Shipment</h2>

<input type="text" placeholder="Tracking Number">

<input type="text" placeholder="Customer Name">

<input type="text" placeholder="Current Location">

<input type="text" placeholder="Destination">

<select>

<option>Processing</option>

<option>In Transit</option>

<option>Arrived</option>

<option>Out for Delivery</option>

<option>Delivered</option>

</select>

<input type="date">

<textarea placeholder="Shipment Notes"></textarea>

<button>Create Shipment</button>

</div>

<table>

<tr>
<th>Tracking No.</th>
<th>Customer</th>
<th>Status</th>
<th>Destination</th>
</tr>

<tr>
<td>ONE100245</td>
<td>John Smith</td>
<td>In Transit</td>
<td>Lagos</td>
</tr>

<tr>
<td>ONE100246</td>
<td>Mary Johnson</td>
<td>Delivered</td>
<td>London</td>
</tr>

</table>

</div>

</body>
</html>
