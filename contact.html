<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Ocean Network Express</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body{background:#f4f8fb;}

header{
background:#003b73;
color:#fff;
text-align:center;
padding:25px;
}

.container{
max-width:1000px;
margin:40px auto;
padding:20px;
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.info,.form{
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

textarea{
height:150px;
}

button{
background:#00a8ff;
color:#fff;
border:none;
padding:15px;
width:100%;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#0088cc;
}

.footer{
text-align:center;
padding:20px;
background:#003b73;
color:#fff;
margin-top:40px;
}

a{
color:#003b73;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>📞 Contact Ocean Network Express</h1>
</header>

<div class="container">

<div class="info">
<h2>Our Office</h2>

<p><strong>📍 Address:</strong><br>
1 Marina Boulevard,<br>
Singapore</p>

<br>

<p><strong>☎ Phone:</strong><br>
+65 1234 5678</p>

<br>

<p><strong>📧 Email:</strong><br>
info@oceannetworkexpress.com</p>

<br>

<p><strong>🌍 Business Hours:</strong><br>
Monday - Friday<br>
8:00 AM - 6:00 PM</p>

</div>

<div class="form">

<h2>Send Us a Message</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Subject">

<textarea placeholder="Write your message..."></textarea>

<button>Send Message</button>

</form>

</div>

</div>

<div class="footer">
© 2026 Ocean Network Express
</div>

</body>
</html>
